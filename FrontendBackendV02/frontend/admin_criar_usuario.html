<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fordox - Cadastro de Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>

<body>
  <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="bg-light border-end" id="sidebar-wrapper">
      <div class="sidebar-heading border-bottom py-4 px-3">
        <img src="/static/LogoInovaBot.png" alt="Fordox" style="max-height: 40px">
      </div>
      <div class="list-group list-group-flush">
        <a href="#" class="list-group-item list-group-item-action">Início</a>
        <a href="dashboard_admin.html" class="list-group-item list-group-item-action">Analytics</a>
        <a href="#" class="list-group-item list-group-item-action">Cadastro Planta</a>
        <a href="dashboard_usuarios.html" class="list-group-item list-group-item-action active">Usuários</a>
      </div>
    </div>

    <!-- Conteúdo principal -->
    <div id="page-content-wrapper" class="w-100">
      <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-4">
        <button class="btn btn-outline-secondary" id="menu-toggle">&#9776;</button>
        <div class="ms-auto">
          <span id="user-email" class="me-3 text-muted small"></span>
          <button class="btn btn-danger btn-sm" id="logout">Sair</button>
        </div>
      </nav>

      <div class="container-fluid p-4">
        <h4 class="mb-4">Cadastro de Usuário</h4>

        <form id="formUsuario">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" required />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" required />
          </div>

          <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" required />
          </div>

          <div class="mb-3">
            <label for="grupo" class="form-label">Grupo</label>
            <select class="form-select" id="grupo" required>
              <option value="">Selecione</option>
              <option value="admin">Admin</option>
              <option value="produtor">Produtor</option>
              <option value="tecnico">Técnico</option>
            </select>
          </div>

          <div class="mb-3">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
          </div>

          <div id="mensagem" class="mt-3 small"></div>
        </form>
      </div>
    </div>
  </div>
  <script src="/static/js/admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
