<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fordox - Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>

<body>
  <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="bg-light border-end" id="sidebar-wrapper">
      <div class="sidebar-heading border-bottom py-4 px-3">
        <img src="/static/LogoInovaBot.png" alt="Fordox" style="max-height: 40px" />
      </div>
      <div class="list-group list-group-flush">
        <a href="dashboard_admin.html" class="list-group-item list-group-item-action">Início</a>
        <a href="#" class="list-group-item list-group-item-action active">Usuários</a>
      </div>
    </div>

    <!-- Conteúdo principal -->
    <div id="page-content-wrapper" class="w-100">
      <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-4">
        <div class="ms-auto">
          <button class="btn btn-danger btn-sm" id="logout">Sair</button>
        </div>
      </nav>

      <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">Usuários Cadastrados</h4>
          <a href="admin_criar_usuario.html" class="btn btn-primary">+ Novo Usuário</a>
        </div>

        <div id="mensagem" class="mb-3 text-success"></div>

        <table class="table table-bordered table-hover">
          <thead class="table-light">
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Grupo</th>
            </tr>
          </thead>
          <tbody id="tabela-usuarios">
            <!-- Os dados serão preenchidos via JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/js/listar_usuarios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
